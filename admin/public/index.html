<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTADOR | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-static@0.223.0/lib/lucide.min.js"></script>
    <script>
        window.lucideIcons = { Layout: 'layout', Users: 'users', CreditCard: 'credit-card', Zap: 'zap', History: 'history', ArrowRight: 'arrow-right' };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [tab, setTab] = useState('dashboard');
            const [stats, setStats] = useState({ users: 0, organizations: 0, total_payments_usd: 0, ai_transactions: 0 });
            const [users, setUsers] = useState([]);
            const [payments, setPayments] = useState([]);
            const [vouchers, setVouchers] = useState([]);
            const [usage, setUsage] = useState([]);
            const [funnel, setFunnel] = useState([]);
            const [payments_log, setPaymentsLog] = useState([]);
            const [password, setPassword] = useState(localStorage.getItem('admin_pass') || '');
            const [isAuthed, setIsAuthed] = useState(false);
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState('');

            const LucideIcon = ({ name, size = 16, className = "" }) => {
                const iconName = window.lucideIcons[name] || name.toLowerCase();
                return <i data-lucide={iconName} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
            };

            const apiFetch = async (endpoint, method = 'GET', body = null) => {
                const headers = { 
                    'x-admin-password': password,
                    'Content-Type': 'application/json'
                };
                const config = { method, headers };
                if (body) config.body = JSON.stringify(body);
                
                const res = await fetch(endpoint, config);
                if (res.status === 401) {
                    setIsAuthed(false);
                    return null;
                }
                return res.json();
            };

            const loadDashboard = async () => {
                const data = await apiFetch('/api/dashboard');
                if (data) { setStats(data); setIsAuthed(true); }
            };

            const loadUsers = async () => {
                const data = await apiFetch(`/api/users?search=${search}`);
                if (data) setUsers(data);
            };

            const loadBilling = async () => {
                const [payData, vData] = await Promise.all([
                    apiFetch('/api/payments'),
                    apiFetch('/api/vouchers')
                ]);
                if (payData) setPayments(payData);
                if (vData) setVouchers(vData);
            };

            const loadFunnel = async () => {
                const data = await apiFetch('/api/admin/analytics/funnel');
                if (data) setFunnel(data);
            };

            const loadAI = async () => {
                const data = await apiFetch('/api/ai-usage');
                if (data) setUsage(data);
            };

            const loadPaymentsLog = async () => {
                const data = await apiFetch('/api/payments');
                if (data) setPaymentsLog(data);
            };

            useEffect(() => {
                if (isAuthed) {
                    if (tab === 'dashboard') { loadDashboard(); loadFunnel(); }
                    if (tab === 'users') loadUsers();
                    if (tab === 'billing') loadBilling();
                    if (tab === 'payments_log') loadPaymentsLog();
                    if (tab === 'ai') loadAI();
                }
            }, [tab, isAuthed, search]);

            useEffect(() => {
                if (window.lucide) {
                    setTimeout(() => window.lucide.createIcons(), 100);
                }
            }, [tab, isAuthed, users, stats, funnel, payments_log]);

            const login = () => {
                localStorage.setItem('admin_pass', password);
                loadDashboard();
            };

            if (!isAuthed) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50 px-4">
                        <div className="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
                            <div className="text-center">
                                <h2 className="text-3xl font-extrabold text-gray-900 tracking-tight">ADMIN PORTAL</h2>
                                <p className="mt-2 text-sm text-gray-500 italic">Contador Accounting Engine v1.0</p>
                            </div>
                            <div className="mt-8 space-y-6">
                                <input
                                    type="password"
                                    placeholder="Введите пароль доступа"
                                    className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black focus:border-black outline-none transition-all"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && login()}
                                />
                                <button
                                    onClick={login}
                                    className="w-full py-4 bg-black text-white rounded-xl font-bold hover:bg-gray-800 transition-all shadow-lg active:scale-[0.98]"
                                >
                                    Войти в систему
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-72 bg-white border-r border-gray-100 flex flex-col p-6 space-y-8 shadow-sm z-10">
                        <div>
                            <h1 className="text-xl font-black tracking-tighter">CONTADOR<span className="text-gray-400">ADMIN</span></h1>
                        </div>
                        <nav className="flex-1 space-y-1">
                            {[
                                { id: 'dashboard', label: 'Дашборд', icon: 'Layout' },
                                { id: 'users', label: 'Управление юзерами', icon: 'Users' },
                                { id: 'billing', label: 'Биллинг и Ваучеры', icon: 'CreditCard' },
                                { id: 'payments_log', label: 'Журнал платежей', icon: 'History' },
                                { id: 'ai', label: 'Мониторинг AI', icon: 'Zap' }
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setTab(item.id)}
                                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                                        tab === item.id ? 'bg-black text-white shadow-lg' : 'text-gray-600 hover:bg-gray-50'
                                    }`}
                                >
                                    <LucideIcon name={item.icon} size={18} />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        <button 
                            onClick={() => setIsAuthed(false)}
                            className="flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold text-red-500 hover:bg-red-50 transition-all"
                        >
                            <LucideIcon name="LogOut" size={18} className="text-red-500" />
                            <span>Выход</span>
                        </button>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-auto bg-[#fafafa]">
                        <div className="p-10 max-w-7xl mx-auto">
                            {tab === 'dashboard' && (
                                <div className="space-y-8">
                                    <h2 className="text-3xl font-bold tracking-tight">Обзор системы</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                                        {[
                                            { label: 'Пользователи', val: stats.users },
                                            { label: 'Организации', val: stats.organizations },
                                            { label: 'Выручка (USD)', val: `$${Number(stats.total_payments_usd).toFixed(0)}` },
                                            { label: 'ИИ Транзакций', val: stats.ai_transactions },
                                            { 
                                                label: 'AI Latency', 
                                                val: `${(stats.avg_latency_ms / 1000).toFixed(1)}s`, 
                                                sub: stats.avg_latency_ms < 10000 ? 'Stable' : stats.avg_latency_ms < 20000 ? 'Slow' : 'Critical'
                                            }
                                        ].map((item, i) => (
                                            <div key={i} className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm transition-all hover:shadow-md">
                                                <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">{item.label}</p>
                                                <p className="text-4xl font-black text-gray-900">{item.val}</p>
                                                {item.sub && <p className="text-[10px] font-bold text-gray-400 mt-2 uppercase">{item.sub}</p>}
                                            </div>
                                        ))}
                                    </div>

                                    {/* Funnel Section */}
                                    <div className="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm space-y-8">
                                        <div className="flex justify-between items-center">
                                            <h3 className="text-lg font-bold tracking-tight">Воронка конверсии</h3>
                                            <span className="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Analytics v3.0</span>
                                        </div>
                                        <div className="flex items-center space-x-2 h-40">
                                            {funnel.map((item, i) => {
                                                const next = funnel[i+1];
                                                const cr = next ? ((next.count / item.count) * 100 || 0).toFixed(1) : null;
                                                const height = funnel[0].count > 0 ? (item.count / funnel[0].count) * 100 : 0;
                                                return (
                                                    <React.Fragment key={i}>
                                                        <div className="flex-1 h-full flex flex-col justify-end group cursor-help">
                                                            <div className="bg-gray-200 rounded-t-xl w-full transition-all duration-700 group-hover:bg-gray-400" style={{ height: `${Math.max(height, 5)}%` }}></div>
                                                            <div className="mt-4 text-center">
                                                                <p className="text-[9px] font-bold text-gray-400 uppercase truncate px-1">{item.label}</p>
                                                                <p className="text-xl font-black text-gray-900">{item.count}</p>
                                                            </div>
                                                        </div>
                                                        {cr && (
                                                            <div className="flex flex-col items-center justify-center px-4 text-gray-200">
                                                                <div className="h-[1px] w-6 bg-gray-100"></div>
                                                                <span className="text-[10px] font-black mt-2 text-gray-400">{cr}%</span>
                                                            </div>
                                                        )}
                                                    </React.Fragment>
                                                )
                                            })}
                                        </div>
                                    </div>
                                    <div className="bg-gray-50 border border-gray-100 p-6 rounded-2xl flex items-center justify-between">
                                        <div>
                                            <h3 className="text-gray-900 font-bold">Справочная информация</h3>
                                            <p className="text-gray-500 text-sm mt-1">Все финансовые данные обновляются в реальном времени. Стоимость ИИ рассчитана на базе API GPT-4o.</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {tab === 'users' && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-bold">Клиенты</h2>
                                        <input 
                                            type="text" 
                                            placeholder="Поиск по Email..." 
                                            className="px-4 py-2 border rounded-xl w-72 focus:ring-2 focus:ring-black outline-none shadow-sm transition-all"
                                            value={search}
                                            onChange={(e) => setSearch(e.target.value)}
                                        />
                                    </div>
                                    <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
                                        <table className="w-full text-left">
                                            <thead className="bg-[#fbfbfb] border-b">
                                                <tr>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Пользователь</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Организация</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Тариф</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Статус</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-right">Действия</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {users.flatMap(u => (u.organizations || []).map(o => ({ 
                                                    ...o, 
                                                    userEmail: u.email, 
                                                    userCreatedAt: u.createdAt,
                                                    lastPaymentDate: o.lastPayment?.created_at 
                                                }))).map(item => {
                                                    const now = new Date();
                                                    const validUntil = item.subscription?.valid_until ? new Date(item.subscription.valid_until) : null;
                                                    const plan = item.subscription?.plan || 'FREE';
                                                    
                                                    let statusText = 'Бессрочно';
                                                    let statusColor = 'text-gray-400 bg-gray-50';
                                                    
                                                    if (plan === 'PRO') {
                                                        if (validUntil && validUntil > now) {
                                                            const diff = Math.ceil((validUntil - now) / (1000 * 60 * 60 * 24));
                                                            statusText = `Активен (${diff} дн.)`;
                                                            statusColor = 'text-emerald-600 bg-emerald-50';
                                                        } else {
                                                            statusText = 'Истек';
                                                            statusColor = 'text-rose-600 bg-rose-50';
                                                        }
                                                    } else if (plan === 'MYAPI') {
                                                        statusText = 'Manual';
                                                        statusColor = 'text-blue-600 bg-blue-50';
                                                    }

                                                    return (
                                                        <tr key={item.id} className="hover:bg-gray-50/50 transition-colors">
                                                            <td className="px-6 py-5">
                                                                <div className="font-mono text-xs font-bold text-gray-900">{item.userEmail}</div>
                                                                <div className="text-[10px] text-gray-400 mt-1">Рег: {new Date(item.userCreatedAt).toLocaleDateString()}</div>
                                                            </td>
                                                            <td className="px-6 py-5">
                                                                <div className="font-bold text-sm text-gray-800">{item.name}</div>
                                                                <div className="text-[10px] text-gray-400">ИНН: {item.inn || '—'}</div>
                                                            </td>
                                                            <td className="px-6 py-5">
                                                                <div className="flex flex-col space-y-1">
                                                                    <select 
                                                                        className={`px-3 py-1 rounded-lg text-[10px] font-black uppercase transition-all outline-none cursor-pointer border ${
                                                                            plan === 'PRO' ? 'bg-black text-white border-black' : 
                                                                            plan === 'MYAPI' ? 'bg-white text-blue-600 border-blue-200' : 'bg-white text-gray-400 border-gray-200'
                                                                        }`}
                                                                        value={plan}
                                                                        onChange={async (e) => {
                                                                            const newPlan = e.target.value;
                                                                            await apiFetch(`/api/users/${item.id}/plan`, 'PATCH', { plan: newPlan });
                                                                            loadUsers();
                                                                        }}
                                                                    >
                                                                        <option value="FREE">FREE</option>
                                                                        <option value="PRO">PRO</option>
                                                                        <option value="MYAPI">MYAPI</option>
                                                                    </select>
                                                                    {item.lastPaymentDate && (
                                                                        <span className="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">
                                                                            Оплата: {new Date(item.lastPaymentDate).toLocaleDateString()}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-5">
                                                                <div className={`inline-flex px-2 py-1 rounded text-[10px] font-bold uppercase tracking-widest ${statusColor}`}>
                                                                    {statusText}
                                                                </div>
                                                                {validUntil && plan === 'PRO' && (
                                                                     <div className="text-[9px] text-gray-400 mt-1 font-medium">{validUntil.toLocaleDateString()}</div>
                                                                )}
                                                            </td>
                                                            <td className="px-6 py-5 text-right">
                                                                <div className="flex items-center justify-end space-x-3">
                                                                    <button 
                                                                        onClick={async () => {
                                                                            const days = prompt("На сколько дней продлить PRO?", "30");
                                                                            if(days) {
                                                                                await apiFetch(`/api/users/${item.id}/upgrade`, 'POST', { days });
                                                                                loadUsers();
                                                                            }
                                                                        }}
                                                                        className="flex items-center space-x-2 px-4 py-2.5 bg-black text-white rounded-xl hover:bg-gray-800 transition-all shadow-sm text-[11px] font-bold uppercase tracking-tight"
                                                                    >
                                                                        <LucideIcon name="ArrowRight" size={14} />
                                                                        <span>Продлить PRO</span>
                                                                    </button>
                                                                    <button 
                                                                        onClick={async () => {
                                                                            if(confirm(`Сбросить лимит ИИ для "${item.name}"?`)) {
                                                                                await apiFetch(`/api/users/${item.id}/reset-ai`, 'POST');
                                                                                alert('Лимит сброшен!');
                                                                            }
                                                                        }}
                                                                        className="flex items-center space-x-2 px-4 py-2.5 bg-white text-gray-900 border border-gray-200 rounded-xl hover:bg-gray-50 transition-all shadow-sm text-[11px] font-bold uppercase tracking-tight"
                                                                    >
                                                                        <LucideIcon name="Zap" size={14} />
                                                                        <span>Сброс ИИ</span>
                                                                    </button>
                                                                    {plan === 'MYAPI' && (
                                                                        <div className="flex items-center space-x-2 bg-gray-50 p-2 rounded-xl border border-gray-100">
                                                                            <input 
                                                                                type="password"
                                                                                placeholder="API KEY"
                                                                                defaultValue={item.subscription?.custom_api_key || ''}
                                                                                className="text-[10px] font-mono border-none bg-transparent w-20 outline-none focus:ring-0"
                                                                                onBlur={async (e) => {
                                                                                    if (e.target.value !== item.subscription?.custom_api_key) {
                                                                                        await apiFetch(`/api/users/${item.id}/api-key`, 'PATCH', { apiKey: e.target.value });
                                                                                        loadUsers();
                                                                                    }
                                                                                }}
                                                                            />
                                                                            <span className="text-[9px] font-black text-gray-900 uppercase">BYOK</span>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {tab === 'billing' && (
                                <div className="space-y-12">
                                    {/* Voucher Generator */}
                                    <div className="space-y-6">
                                        <h2 className="text-2xl font-bold">Генерация ваучеров</h2>
                                        <div className="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm flex items-end space-x-6">
                                            <div>
                                                <label className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 block">Количество</label>
                                                <input id="v_count" type="number" defaultValue="5" className="px-4 py-3 border rounded-xl w-32 focus:ring-2 focus:ring-black outline-none" />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 block">Срок (дней)</label>
                                                <input id="v_days" type="number" defaultValue="30" className="px-4 py-3 border rounded-xl w-32 focus:ring-2 focus:ring-black outline-none" />
                                            </div>
                                            <button 
                                                onClick={async () => {
                                                    const count = document.getElementById('v_count').value;
                                                    const days = document.getElementById('v_days').value;
                                                    await apiFetch('/api/vouchers/generate', 'POST', { count, days });
                                                    loadBilling();
                                                }}
                                                className="px-8 py-4 bg-black text-white rounded-xl font-bold hover:bg-gray-800 transition-all shadow-lg active:scale-95"
                                            >Создать пакет ваучеров</button>
                                        </div>
                                    </div>

                                    {/* Voucher List */}
                                    <div className="space-y-6">
                                        <h3 className="text-xl font-bold text-gray-400">Последние ваучеры</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {vouchers.map(v => (
                                                <div key={v.id} className={`p-4 rounded-xl border border-dashed text-center font-mono ${
                                                    v.is_used ? 'bg-gray-50 text-gray-300 border-gray-200' : 'bg-white border-black text-black shadow-sm'
                                                }`}>
                                                    <div className="text-lg font-bold">{v.code}</div>
                                                    <div className="text-[10px] uppercase font-bold tracking-widest">{v.days_granted} дней | {v.is_used ? 'ИСПОЛЬЗОВАН' : 'АКТИВЕН'}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Payments Table */}
                                    <div className="space-y-6">
                                        <h2 className="text-2xl font-bold">История оплат (Payme / Click)</h2>
                                        <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
                                            <table className="w-full text-left">
                                                <thead className="bg-[#fbfbfb] border-b">
                                                    <tr>
                                                        <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Дата</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">ID Орг.</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Шлюз</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Сумма</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Статус</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {payments.map(p => (
                                                        <tr key={p.id} className="border-b last:border-0">
                                                            <td className="px-6 py-4 text-sm">{new Date(p.created_at).toLocaleDateString()}</td>
                                                            <td className="px-6 py-4 text-xs font-mono">{p.organization_id.substring(0, 8)}...</td>
                                                            <td className="px-6 py-4"><span className="text-[10px] font-bold px-2 py-1 bg-gray-100 rounded-md border">{p.provider}</span></td>
                                                            <td className="px-6 py-4 font-bold text-green-600">{p.amount}</td>
                                                            <td className="px-6 py-4">
                                                                <span className={`text-[10px] font-bold px-2 py-1 rounded-md ${
                                                                    p.status === 'SUCCESS' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'
                                                                }`}>{p.status}</span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {tab === 'payments_log' && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-bold font-mono uppercase tracking-tighter text-gray-900 line-through decoration-gray-300">Журнал Тразакций</h2>
                                        <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest bg-gray-50 px-3 py-1 rounded-full border border-gray-100">Audit Mode v3.0</div>
                                    </div>
                                    <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
                                        <table className="w-full text-left">
                                            <thead className="bg-[#fbfbfb] border-b">
                                                <tr>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">ID Транзакции / Ваучера</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Организация</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Сумма</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Провайдер</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Дата</th>
                                                    <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Статус</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {payments_log.map(p => (
                                                    <tr key={p.id} className="hover:bg-gray-50/50 transition-colors">
                                                        <td className="px-6 py-4 font-mono text-[10px] text-gray-500">{p.external_id || p.id.substring(0,18)}</td>
                                                        <td className="px-6 py-4 font-bold text-sm text-gray-800">{p.org_name}</td>
                                                        <td className="px-6 py-4">
                                                            <div className="font-black text-gray-900">{Number(p.amount).toLocaleString()} UZS</div>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            <span className={`text-[10px] font-black uppercase px-2 py-1 rounded inline-block border ${
                                                                p.provider === 'PAYME' ? 'bg-cyan-50 text-cyan-600 border-cyan-100' :
                                                                p.provider === 'CLICK' ? 'bg-blue-50 text-blue-600 border-blue-100' : 
                                                                p.provider === 'VOUCHER' ? 'bg-black text-white border-black' : 'bg-gray-50 text-gray-400 border-gray-200'
                                                            }`}>{p.provider}</span>
                                                        </td>
                                                        <td className="px-6 py-4 text-xs text-gray-400 font-medium">{new Date(p.created_at).toLocaleString()}</td>
                                                        <td className="px-6 py-4">
                                                            <span className={`text-[10px] font-black uppercase inline-flex items-center space-x-1 ${
                                                                p.status === 'SUCCESS' ? 'text-emerald-500' : 
                                                                p.status === 'PENDING' ? 'text-amber-500' : 'text-rose-500'
                                                            }`}>
                                                                <div className={`w-1.5 h-1.5 rounded-full ${
                                                                    p.status === 'SUCCESS' ? 'bg-emerald-500' : 
                                                                    p.status === 'PENDING' ? 'bg-amber-500' : 'bg-rose-500'
                                                                }`}></div>
                                                                <span>{p.status}</span>
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                        {payments_log.length === 0 && (
                                            <div className="p-20 text-center text-gray-400 font-bold uppercase tracking-widest text-[10px]">Транзакции не найдены</div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {tab === 'ai' && (
                                <div className="space-y-8">
                                    <h2 className="text-2xl font-bold">Расход ИИ Ресурсов</h2>
                                    <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
                                        <table className="w-full text-left">
                                            <thead className="bg-[#fbfbfb] border-b">
                                                <tr>
                                                    <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Организация</th>
                                                    <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Запросов</th>
                                                    <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Токены (I/O)</th>
                                                    <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Затраты (USD)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {usage.map(u => (
                                                    <tr key={u.organization_id}>
                                                        <td className="px-6 py-5 font-bold text-sm">{u.org_name}</td>
                                                        <td className="px-6 py-5 text-sm">{u._count.id}</td>
                                                        <td className="px-6 py-5 text-xs text-gray-500 font-mono">
                                                            {u._sum.tokens_input} / {u._sum.tokens_output}
                                                        </td>
                                                        <td className="px-6 py-5 font-black text-red-600">${Number(u._sum.cost_usd).toFixed(4)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
