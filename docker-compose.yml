version: '3.8'

networks:
  contador-net:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    container_name: contador-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: contador
    # No public ports for DB in Enterprise mode
    expose:
      - "5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - contador-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d contador"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: contador-app
    container_name: contador-app
    restart: always
    ports:
      - "3030:3030"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/contador
      NEXT_PUBLIC_PORT: 3030
      BASIC_AUTH_USER: admin
      BASIC_AUTH_PASSWORD: securepassword
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - contador-net

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    image: contador-admin
    container_name: contador-admin
    restart: always
    ports:
      - "3031:3031"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/contador
      ADMIN_PORT: 3031
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - contador-net
